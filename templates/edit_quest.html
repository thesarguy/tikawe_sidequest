{% extends "layout.html" %}
{% block title %}Edit quest{% endblock %}

{% block content %}
<h2>{{ quest.title }}</h2>
<h3>Edit quest</h3>

<form action="/update_quest" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
  <input type="hidden" name="quest_id" value="{{ quest.id }}">
  <p>
    <label for="title">Title</label>:<br />
    <input type="text" name="title" id="title" maxlength="100" required value="{{ quest.title }}" />
  </p>
  <p>
    <label for="description">Description</label>:<br />
    <textarea name="description" id="description" rows="6" maxlength="2000" required>{{ quest.description }}</textarea>
  </p>
  <p>
    <label for="instructions">Instructions (optional)</label>:<br />
    <textarea name="instructions" id="instructions" rows="4">{{ quest.instructions or '' }}</textarea>
  </p>
  <p>
    <label for="difficulty">Difficulty</label>:<br />
    <select name="difficulty" id="difficulty">
      <option value="">– Select –</option>
      {% for d in difficulties %}
      <option value="{{ d }}" {% if quest.difficulty == d %}selected{% endif %}>{{ d }}</option>
      {% endfor %}
    </select>
  </p>
  <p>
    <label for="duration">Estimated duration</label>:<br />
    <select name="duration" id="duration">
      <option value="">– Select –</option>
      {% for k in kesto %}
      <option value="{{ k }}" {% if quest.estimated_duration == k %}selected{% endif %}>{{ k }}</option>
      {% endfor %}
    </select>
  </p>
  <p>Tags (select one or more):<br />
    {% for tag in all_tags %}
    <label>
      <input type="checkbox" name="tags" value="{{ tag.id }}"
        {% if tag.id in current_tag_ids %}checked{% endif %}> {{ tag.name }}
    </label>
    {% endfor %}
  </p>
  <input type="submit" value="Save changes" />
</form>

<p><a href="/quest/{{ quest.id }}">Back to quest</a></p>

{% endblock %}
