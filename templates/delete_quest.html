{% extends "layout.html" %}
{% block title %}Delete quest{% endblock %}

{% block content %}
<h2>{{ quest.title }}</h2>
<h3>Delete quest</h3>
<p>Are you sure you want to delete this quest?</p>
<form action="/remove_quest/{{ quest.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" name="confirm" value="Delete quest">
  <input type="submit" name="back" value="Cancel">
</form>
{% endblock %}
